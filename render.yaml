services:
  - type: web
    name: codeduel-backend
    env: node
    branch: main
    plan: free
    buildCommand: npm ci && (cd frontend && npm ci && ./node_modules/.bin/vite build)
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
